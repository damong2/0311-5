<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>5-1번 반응형 레이아웃</title>
  <style>
    * {
      margin: 0;
      padding: 0;
    }
    body {
      background-color: #666;
    }
    #wrap {
      max-width: 1920px;
      width: 100%;
      margin: 0 auto;
    }
    .container {
      width: 1200px;
      margin: 0 auto;
    }
    #header {
      height: 100px;
      background-color: #EEEBE9;
    }
    .head {
      height: 100px;
      background-color: #D5CCC9;
    }
    #nav {
      height: 100px;
      background-color: #B9AAA5;
    }
    .lnb {
      height: 100px;
      background-color: #9D8980;
    }
    #main {
      background-color: #886F65;
    }
    .section {
      height: 100px;
      background-color: #74574A;
    }
    .aside {
      display: flex;
      flex-wrap: wrap;
      /* background-color: #f10000; */
    }
    .article1 {
      width: 100%;
      height: 200px;
      background-color: #684D43;
    }
    .article2 {
      width: 50%;
      height: 480px;
      background-color: #594139;
    }
    .article3 {
      width: 50%;
      height: 480px;
      background-color: #4A352F;
    }
    #footer {
      height: 100px;
      background-color: #4E342E;
    }
    .foot {
      height: 100px;
      background-color: #3E2723;
    }

      @media (max-width:1280px) {
        .container {
          width: 90%;
        }
        #main .container {
          display: flex;
          flex-wrap: wrap;
          width: 90%;
        }
        .section {
          width: 30%;
          height: auto;
        }
        .aside {
          width: 70%;
        }
        .article1 {
          width: 100%;
          height: 390px;
        }
        .article2, .article3 {
          width: 50%;
          height: 390px;
        }
      }
      @media (max-width:768px) {
        #main .container {
          width: 100%;
        }
        .container {
          width: 100%;
        }
        .article1, .article2, .article3 {
          width: 100%;
          height: 260px;
        }
      }
      @media (max-width:480px) {
        .section {
          width: 100%;
          height: 150px;
        }
        .aside {
          width: 100%;
        }
        .article1, .article2, .article3 {
          width: 100%;
          height: 210px;
        }
      }

  </style>
</head>
<body>
  <div id="wrap">
    <div id="header">
      <div class="container">
        <div class="head"></div>
      </div>
    </div>
    <div id="nav">
      <div class="container">
        <div class="lnb"></div>
      </div>
    </div>
    <div id="main">
      <div class="container">
        <div class="section"></div>
        <div class="aside">
          <div class="article1"></div>
          <div class="article2"></div>
          <div class="article3"></div>
        </div>
      </div>
    </div>
    <div id="footer">
      <div class="foot"></div>
    </div>
  </div>
</body>
</html>
